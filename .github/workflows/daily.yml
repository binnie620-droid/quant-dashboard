name: UCHIDA Daily Signal

on:
  schedule:
    - cron: '30 7 * * 1-5'   # UTC 07:30 = KST 16:30, 월~금
  workflow_dispatch:           # 수동 실행 버튼 (테스트용)

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # signals.json commit 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r scripts/requirements.txt

      - name: 신호 계산 + 텔레그램 알림
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/daily_signal.py

      - name: signals.json 커밋
        run: |
          git config user.name  "uchida-bot"
          git config user.email "bot@uchida"
          git add data/signals.json data/bot_state.json
          git diff --staged --quiet || git commit -m "chore: daily signal update $(date +'%Y-%m-%d')"
          git push
